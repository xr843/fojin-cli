# Builds cross-platform `fojin` binaries and attaches them to the GitHub
# Release created for a pushed `vN.N.N` tag (binary release, e.g. v0.1.0).
#
# NOTE: this ships the CLI binary only. On first run the binary downloads
# the data artifact (the parallels SQLite DB), which is published
# separately under its own `data-vN` tag (see src/cli.rs). Cutting a
# binary release does NOT publish or update the data artifact.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive (unix)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          staging="fojin-${version}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/fojin" "$staging/"
          tar -czf "${staging}.tar.gz" "$staging"
          echo "ASSET=${staging}.tar.gz" >> "$GITHUB_ENV"

      - name: Package archive (windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          $staging = "fojin-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/fojin.exe" "$staging/"
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          Add-Content -Path $env:GITHUB_ENV -Value "ASSET=$staging.zip"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
